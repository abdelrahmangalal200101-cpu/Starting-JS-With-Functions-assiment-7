<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css">
  </head>
  <body>
    <div class="container-fluid bg-white shadow-sm py-2 fixed-top">
      <div class="container">
        <nav class="navbar navbar-expand-lg bg-white">
          <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-3" href="#">
              <div
                class="rounded-circle logo-color d-flex justify-content-center align-items-center"
                style="
                  width: 50px;
                  height: 50px;
                  background: linear-gradient(to top left, #fd4129, #ff6a55);
                "
              >
                <i class="fa-solid fa-utensils text-white fs-5"></i>
              </div>

              <div class="d-flex flex-column lh-sm">
                <h4 class="m-0 p-0 fw-bold">What's For Dinner</h4>
                <span class="text-muted pt-1" style="font-size: 12px"
                  >Your daily meal inspiration</span
                >
              </div>
            </a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNavDropdown"
              aria-controls="navbarNavDropdown"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
              <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item d-flex align-items-center mb-3 mt-lg-0 mt-3 mb-lg-0">
                  <a
                    class="nav-link make-hover d-flex align-items-center"
                    href="#"
                  >
                    <i class="fa-solid fa-bookmark fs-5 text-secondary"></i>
                    <span class="d-inline d-lg-none ms-2">Saved Recipes</span>
                  </a>
                </li>
                <li class="nav-item d-flex align-items-center mb-3 mb-lg-0">
                  <a
                    class="nav-link make-hover d-flex align-items-center"
                    href="#"
                  >
                    <i class="fa-solid fa-rotate-right fs-5 text-secondary"></i>
                    <span class="d-inline d-lg-none ms-2">Resend</span>
                  </a>
                </li>
                <li class="nav-item d-flex align-items-center mb-3 mb-lg-0">
                  <a
                    class="nav-link d-flex make-hover align-items-center"
                    href="#"
                  >
                    <i class="fa-solid fa-gear fs-5 text-secondary"></i>
                    <span class="d-inline d-lg-none ms-2">Settings</span>
                  </a>
                </li>
                <li class="nav-item d-flex align-items-center">
                  <a class="nav-link d-flex align-items-center" href="#">
                    <img
                      src="images/avatar-4.jpg"
                      alt=""
                      class="rounded-circle"
                      style="
                        width: 50px;
                        height: 50px;
                        border: 3px solid #fd4129;
                      "
                    />
                    <span class="d-inline d-lg-none ms-2">Profile</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </div>
    <div class="container-fluid py-5" id="demo"></div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
